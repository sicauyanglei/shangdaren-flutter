<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI自动化逻辑测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Consolas', 'Monaco', 'Microsoft YaHei', monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { color: #58a6ff; text-align: center; margin-bottom: 20px; font-size: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .panel h3 { color: #58a6ff; margin-bottom: 12px; font-size: 16px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn { background: #238636; color: #fff; border: none; padding: 10px 20px; font-size: 14px; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .btn-danger { background: #da3633; }
    .btn-danger:hover { background: #f85149; }
    .btn-warning { background: #9e6a03; }
    .btn-warning:hover { background: #bb8009; }
    select, input { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 14px; }
    .progress-wrap { background: #21262d; border-radius: 10px; overflow: hidden; height: 24px; margin: 10px 0; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #238636, #58a6ff); transition: width 0.3s; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; font-weight: bold; }
    .log-area { background: #010409; border: 1px solid #30363d; border-radius: 6px; padding: 12px; max-height: 500px; overflow-y: auto; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .log-area .pass { color: #3fb950; }
    .log-area .fail { color: #f85149; font-weight: bold; }
    .log-area .warn { color: #d29922; }
    .log-area .info { color: #58a6ff; }
    .log-area .dim { color: #484f58; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .stat-card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
    .stat-card .label { color: #8b949e; font-size: 12px; margin-bottom: 4px; }
    .stat-card .value { font-size: 28px; font-weight: bold; }
    .stat-card .value.green { color: #3fb950; }
    .stat-card .value.red { color: #f85149; }
    .stat-card .value.blue { color: #58a6ff; }
    .stat-card .value.yellow { color: #d29922; }
    .issue-list { margin-top: 12px; }
    .issue-item { background: #21262d; border-left: 4px solid #f85149; padding: 10px 14px; margin-bottom: 8px; border-radius: 0 6px 6px 0; font-size: 13px; }
    .issue-item.resolved { border-left-color: #3fb950; }
    .issue-item .issue-title { font-weight: bold; margin-bottom: 4px; }
    .issue-item .issue-detail { color: #8b949e; font-size: 12px; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 16px; }
    .tab { padding: 10px 20px; background: #21262d; border: 1px solid #30363d; cursor: pointer; font-family: inherit; color: #8b949e; font-size: 14px; }
    .tab:first-child { border-radius: 6px 0 0 6px; }
    .tab:last-child { border-radius: 0 6px 6px 0; }
    .tab.active { background: #58a6ff; color: #fff; border-color: #58a6ff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #gameDom { display: none !important; }
  </style>
</head>
<body>
  <div id="gameDom">
    <div id="startScreen"></div>
    <div class="game-container">
      <div id="roundNum"></div>
      <div id="deckStack"></div>
      <div id="dealingOverlay" class="hidden"><div class="dealing-text"></div></div>
      <div id="dealingMask" class="hidden"></div>
      <div id="pauseOverlay" class="hidden"></div>
      <div id="wechatGuide" class="hidden"></div>
      <div id="rotatePrompt" class="hidden"></div>
      <div id="difficultyButtons"></div>
      <div id="piaoEnabledButtons"></div>
      <div id="piaoCountdown"></div>
      <div id="player1HandCount">0</div>
      <div id="myHandCount">0</div>
      <div id="player2HandCount">0</div>
      <div id="player1Score">0</div>
      <div id="myScore">0</div>
      <div id="player2Score">0</div>
      <div id="player1Piao" class="hidden"></div>
      <div id="myPiao" class="hidden"></div>
      <div id="player2Piao" class="hidden"></div>
      <div id="player1Melds"></div>
      <div id="myMelds"></div>
      <div id="player2Melds"></div>
      <div id="player1Discard"></div>
      <div id="myDiscard"></div>
      <div id="player2Discard"></div>
      <div id="myHand"></div>
      <div id="playedCards"></div>
      <div id="actionButtons"></div>
      <div id="tingBadge" class="hidden"></div>
      <div id="zimoBadge" class="hidden"></div>
      <div id="myHuBadge" class="hidden"></div>
      <div id="myTimer"></div>
      <div id="myAvatar"></div>
      <div id="player1Avatar"></div>
      <div id="player2Avatar"></div>
      <div id="player1PiaoPopup" class="hidden"></div>
      <div id="myPiaoPopup" class="hidden"></div>
      <div id="player2PiaoPopup" class="hidden"></div>
      <div id="messageArea" class="hidden"></div>
      <div id="messageTitle"></div>
      <div id="messageContent"></div>
      <div id="historyList"></div>
      <div id="huConfirmBtn"></div>
      <div id="huCloseBtn"></div>
      <div id="settingsPopup" class="hidden">
        <input id="volumeSlider" type="range" />
        <div id="volumeValue">50%</div>
        <div id="logCount">0</div>
      </div>
      <div id="settlementPage" class="hidden">
        <div id="settlementContent"></div>
      </div>
      <div id="currentTime"></div>
    </div>
  </div>

  <div class="container">
    <h1>🧪 UI自动化逻辑测试</h1>

    <div class="panel">
      <h3>⚙️ 测试配置</h3>
      <div class="controls">
        <label>难度:
          <select id="testDifficulty">
            <option value="easy">简单</option>
            <option value="medium">中等</option>
            <option value="hard" selected>困难</option>
          </select>
        </label>
        <label>测试局数:
          <select id="testRounds">
            <option value="1">1局</option>
            <option value="8" selected>8局(完整)</option>
            <option value="24">24局(3轮)</option>
            <option value="80">80局(10轮)</option>
          </select>
        </label>
        <label>速度:
          <select id="testSpeed">
            <option value="fast">快速</option>
            <option value="normal" selected>正常</option>
            <option value="slow">慢速</option>
          </select>
        </label>
        <button class="btn" id="runBtn" onclick="startTests()">▶ 开始测试</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopTests()" disabled>⏹ 停止</button>
        <button class="btn btn-warning" onclick="clearResults()">🗑 清空</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('results')">📊 测试结果</div>
      <div class="tab" onclick="switchTab('issues')">🐛 逻辑问题</div>
      <div class="tab" onclick="switchTab('log')">📝 详细日志</div>
    </div>

    <div class="tab-content active" id="tab-results">
      <div class="stats" id="statsArea">
        <div class="stat-card"><div class="label">总测试局数</div><div class="value blue" id="statTotal">0</div></div>
        <div class="stat-card"><div class="label">已完成</div><div class="value green" id="statCompleted">0</div></div>
        <div class="stat-card"><div class="label">胡牌局数</div><div class="value green" id="statHu">0</div></div>
        <div class="stat-card"><div class="label">流局局数</div><div class="value yellow" id="statLiuju">0</div></div>
        <div class="stat-card"><div class="label">逻辑错误</div><div class="value red" id="statErrors">0</div></div>
        <div class="stat-card"><div class="label">AI胡率</div><div class="value blue" id="statAIRate">0%</div></div>
        <div class="stat-card"><div class="label">玩家胡率</div><div class="value blue" id="statPlayerRate">0%</div></div>
        <div class="stat-card"><div class="label">平均胡数</div><div class="value blue" id="statAvgHu">0</div></div>
      </div>
    </div>

    <div class="tab-content" id="tab-issues">
      <div class="panel">
        <h3>🐛 检测到的逻辑问题</h3>
        <div id="issueList" class="issue-list">
          <div style="color: #8b949e; text-align: center; padding: 40px;">尚未开始测试</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-log">
      <div class="log-area" id="logArea"></div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    (function() {
      window.updateUI = function() {};
      window.updateDeckStack = function() {};
      window.initAudioContext = function() {};
      window.checkOrientation = function() {};
      window.enterFullscreenAndLockOrientation = function() { return Promise.resolve(true); };
      window.isMobileDevice = function() { return false; };
      window.playButtonSound = function() {};
      window.playDiscardSound = function() {};
      window.playTickSound = function() {};
      window.animateDrawCard = function(idx, card, cb) { if (cb) cb(); };
      window.animateDiscardCard = function() {};
      window.animateScoreChange = function() {};
      window.showDiscardedCard = function() {};
      window.startCountdown = function() {};
      window.stopCountdown = function() {};
      window.hideAllActionButtons = function() {};
      window.showMessage = function() {};
      window.setupSwipeToClose = function() {};
      window.initSwipeToClose = function() {};
      window.updateTime = function() {};
      window.initAudioOnUserInteraction = function() {};
    })();

    let testRunning = false;
    let testShouldStop = false;
    let testResults = {
      total: 0, completed: 0, huRounds: 0, liujuRounds: 0, errors: 0,
      aiHuCount: 0, playerHuCount: 0, totalHuCount: 0, issues: [], roundResults: []
    };

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      const idx = name === 'results' ? 1 : name === 'issues' ? 2 : 3;
      document.querySelectorAll('.tab')[idx - 1].classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }

    function log(msg, type) {
      type = type || 'info';
      const area = document.getElementById('logArea');
      const span = document.createElement('span');
      span.className = type;
      span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      area.appendChild(span);
      area.scrollTop = area.scrollHeight;
    }

    function clearResults() {
      document.getElementById('logArea').innerHTML = '';
      testResults = {
        total: 0, completed: 0, huRounds: 0, liujuRounds: 0, errors: 0,
        aiHuCount: 0, playerHuCount: 0, totalHuCount: 0, issues: [], roundResults: []
      };
      updateStats();
      document.getElementById('issueList').innerHTML = '<div style="color: #8b949e; text-align: center; padding: 40px;">尚未开始测试</div>';
    }

    function updateProgress(current, total) {
      const pct = Math.round((current / total) * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressBar').textContent = pct + '%';
    }

    function updateStats() {
      const r = testResults;
      document.getElementById('statTotal').textContent = r.total;
      document.getElementById('statCompleted').textContent = r.completed;
      document.getElementById('statHu').textContent = r.huRounds;
      document.getElementById('statLiuju').textContent = r.liujuRounds;
      document.getElementById('statErrors').textContent = r.errors;
      document.getElementById('statAIRate').textContent = r.completed > 0 ? Math.round(r.aiHuCount / r.completed * 100) + '%' : '0%';
      document.getElementById('statPlayerRate').textContent = r.completed > 0 ? Math.round(r.playerHuCount / r.completed * 100) + '%' : '0%';
      const totalHu = r.aiHuCount + r.playerHuCount;
      document.getElementById('statAvgHu').textContent = totalHu > 0 ? (r.totalHuCount / totalHu).toFixed(1) : '0';
    }

    function addIssue(title, detail, severity) {
      severity = severity || 'error';
      testResults.issues.push({ title, detail, severity, time: new Date().toLocaleTimeString() });
      testResults.errors++;
      renderIssues();
    }

    function renderIssues() {
      const list = document.getElementById('issueList');
      if (testResults.issues.length === 0) {
        list.innerHTML = '<div style="color: #3fb950; text-align: center; padding: 40px;">✅ 未检测到逻辑问题</div>';
        return;
      }
      list.innerHTML = testResults.issues.map(issue => `
        <div class="issue-item">
          <div class="issue-title">❌ [${issue.severity}] ${issue.title}</div>
          <div class="issue-detail">${issue.detail} (${issue.time})</div>
        </div>
      `).join('');
    }

    function getSpeedDelay() {
      const speed = document.getElementById('testSpeed').value;
      if (speed === 'fast') return 10;
      if (speed === 'normal') return 50;
      return 200;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function createCard(char) {
      const map = {
        '上':{s:1,p:0,c:'red'},'大':{s:1,p:1,c:'green'},'人':{s:1,p:2,c:'black'},
        '丘':{s:2,p:0,c:'red'},'乙':{s:2,p:1,c:'green'},'己':{s:2,p:2,c:'black'},
        '化':{s:3,p:0,c:'red'},'三':{s:3,p:1,c:'green'},'千':{s:3,p:2,c:'black'},
        '七':{s:4,p:0,c:'red'},'十':{s:4,p:1,c:'green'},'土':{s:4,p:2,c:'black'},
        '尔':{s:5,p:0,c:'red'},'小':{s:5,p:1,c:'green'},'生':{s:5,p:2,c:'black'},
        '八':{s:6,p:0,c:'red'},'九':{s:6,p:1,c:'green'},'子':{s:6,p:2,c:'black'},
        '佳':{s:7,p:0,c:'red'},'作':{s:7,p:1,c:'green'},'亡':{s:7,p:2,c:'black'},
        '福':{s:8,p:0,c:'red'},'禄':{s:8,p:1,c:'green'},'寿':{s:8,p:2,c:'black'}
      };
      const info = map[char] || {s:0,p:0,c:'black'};
      return { character: char, sentence: info.s, position: info.p, color: info.c, id: Math.random().toString(36).substr(2, 9), isSpecial: (char === '上' || char === '福') };
    }

    function createHand(chars) { return chars.split('').map(c => createCard(c)); }

    function setupTestGameState() {
      const difficulty = document.getElementById('testDifficulty').value;
      gameSettings.difficulty = difficulty;
      gameSettings.piaoEnabled = false;
      gameState = {
        deck: [], players: [
          { id:'player1', name:'玩家1', type:'ai', hand:[], melds:[], discards:[], score:0, piao:0, isTing:false, voiceType:'female' },
          { id:'me', name:'我', type:'human', hand:[], melds:[], discards:[], score:0, piao:0, isTing:false, voiceType:'female' },
          { id:'player2', name:'玩家2', type:'ai', hand:[], melds:[], discards:[], score:0, piao:0, isTing:false, voiceType:'male' }
        ],
        currentPlayerIndex:0, dealerIndex:0, roundNumber:0, sessionNumber:1,
        lastDiscardedCard:null, lastDiscardPlayerIndex:-1, lastDrawnCard:null,
        selectedCardIndex:-1, countdown:30, countdownTimer:null,
        isMyTurn:false, waitingForResponse:false, canChi:false, canPeng:false,
        canZhao:false, canHu:false, skipDraw:false, isDrawing:false,
        baseScore:5, multiplierBase:2, playerVoices:['female','male','female'],
        roundHistory:[], testMode:true, isPaused:false, isHandlingHu:false,
        isStartingRound:false, isLiuJuHandled:false, isClosingMessage:false,
        isClosingHuMessage:false, gameStarted:true
      };
    }

    let drawnCardTracker = {};
    let chiPengTracker = {};

    function trackDrawnCard(pi, card) {
      if (!drawnCardTracker[pi]) drawnCardTracker[pi] = [];
      drawnCardTracker[pi].push({ character: card.character, id: card.id });
    }

    function trackChiPeng(pi, meld) {
      if (!chiPengTracker[pi]) chiPengTracker[pi] = [];
      chiPengTracker[pi].push({ type: meld.type, source: meld.source, cards: meld.cards.map(c => c.character) });
    }

    function checkDiscardViolation(pi, discardedCard) {
      const drawn = drawnCardTracker[pi] || [];
      const chiPeng = chiPengTracker[pi] || [];
      const violations = [];
      for (const d of drawn) {
        if (d.id === discardedCard.id) {
          violations.push({ type: 'discard_drawn', message: `AI玩家${pi}丢弃了刚摸的牌: ${discardedCard.character}` });
        }
      }
      if (chiPeng.length > 0) {
        const last = chiPeng[chiPeng.length - 1];
        if (last.source === 'chi') {
          if (last.cards.includes(discardedCard.character)) {
            violations.push({ type: 'discard_chi', message: `AI玩家${pi}丢弃了刚吃的牌: ${discardedCard.character} (吃: ${last.cards.join(',')})` });
          }
        } else if (last.source === 'peng') {
          if (discardedCard.character === last.cards[0]) {
            violations.push({ type: 'discard_peng', message: `AI玩家${pi}丢弃了刚碰的牌: ${discardedCard.character}` });
          }
        }
      }
      return violations;
    }

    function runLogicUnitTests() {
      log('═══════════════════════════════════════', 'dim');
      log('  阶段1: 逻辑单元测试', 'info');
      log('═══════════════════════════════════════', 'dim');
      let passed = 0, failed = 0;
      const tests = [
        { name: 'checkHu - 标准胡牌', fn: () => {
          const hand = createHand('上大人丘乙己化三千七十土');
          const r = checkHu({ name:'T', hand, melds:[], discards:[], isTing:false });
          if (!r.canHu) throw new Error('canHu=false');
          return 'canHu=' + r.canHu + ', huCount=' + r.huCount + ', type=' + (r.huType?.name||'无');
        }},
        { name: 'checkHu - 不能胡牌(缺句)', fn: () => {
          const hand = createHand('上大人丘乙己化三千七十尔');
          const r = checkHu({ name:'T', hand, melds:[], discards:[], isTing:false });
          if (r.canHu) throw new Error('canHu=true 但不应该胡');
          return 'canHu=' + r.canHu;
        }},
        { name: 'checkTing - 听牌检测', fn: () => {
          const hand = createHand('上大人丘乙己化三千七十尔小');
          const r = checkTing({ name:'T', hand, melds:[], discards:[], isTing:false });
          return 'isTing=' + r.isTing + ', tingCards=' + (r.tingCards?.join(',')||'无');
        }},
        { name: 'selectAIDiscardHard - 不丢弃刚摸的牌', fn: () => {
          const hand = createHand('上大丘乙己化三千七十尔小生八');
          const drawnCard = createCard('人');
          hand.push(drawnCard);
          drawnCardTracker = {}; chiPengTracker = {};
          trackDrawnCard(0, drawnCard);
          const idx = selectAIDiscardHard({ name:'AI', hand, melds:[], discards:[], isTing:false });
          const dc = hand[idx];
          const v = checkDiscardViolation(0, dc);
          drawnCardTracker = {};
          if (v.length > 0 && v[0].type === 'discard_drawn') throw new Error(v[0].message);
          return '出牌: ' + dc.character + ' (刚摸: ' + drawnCard.character + ')';
        }},
        { name: 'selectAIDiscardHard - 不丢弃刚吃的牌', fn: () => {
          const hand = createHand('丘乙己化三千七十尔小生八九子佳');
          const chiMeld = { type:'sequence', source:'chi', cards:createHand('上大人') };
          drawnCardTracker = {}; chiPengTracker = {};
          trackChiPeng(0, chiMeld);
          const idx = selectAIDiscardHard({ name:'AI', hand, melds:[chiMeld], discards:[], isTing:false });
          const dc = hand[idx];
          const v = checkDiscardViolation(0, dc);
          chiPengTracker = {};
          if (v.length > 0) throw new Error(v[0].message);
          return '出牌: ' + dc.character;
        }},
        { name: 'selectAIDiscardHard - 不丢弃刚碰的牌', fn: () => {
          const hand = createHand('丘乙己化三千七十尔小生八九子佳');
          const pengMeld = { type:'triplet', source:'peng', cards:createHand('上上上') };
          drawnCardTracker = {}; chiPengTracker = {};
          trackChiPeng(0, pengMeld);
          const idx = selectAIDiscardHard({ name:'AI', hand, melds:[pengMeld], discards:[], isTing:false });
          const dc = hand[idx];
          const v = checkDiscardViolation(0, dc);
          chiPengTracker = {};
          if (v.length > 0) throw new Error(v[0].message);
          return '出牌: ' + dc.character;
        }},
        { name: 'calculateXiangTingShu - 向听数', fn: () => {
          const hand = createHand('上大人丘乙己化三千七十土');
          return '向听数=' + calculateXiangTingShu(hand, []);
        }},
        { name: 'calculateHuCount - 胡数(含特殊牌)', fn: () => {
          const c1 = calculateHuCount(createHand('上大人丘乙己化三千七十土'), []);
          const c2 = calculateHuCount(createHand('福禄寿丘乙己化三千七十土'), []);
          return '含上: ' + c1 + '胡, 含福: ' + c2 + '胡';
        }},
        { name: '牌堆数量(96张)', fn: () => {
          const d = createDeck();
          if (d.length !== 96) throw new Error('牌堆=' + d.length);
          return '96张 ✓';
        }},
        { name: '分数守恒', fn: () => {
          const s = [10, -15, 5].reduce((a,b) => a+b, 0);
          if (s !== 0) throw new Error('总和=' + s);
          return '总分=0 ✓';
        }},
        { name: 'checkHu缓存一致性', fn: () => {
          const hand = createHand('上大人丘乙己化三千七十土');
          const p = { name:'T', hand, melds:[], discards:[], isTing:false };
          clearCaches();
          const r1 = checkHu(p); const r2 = checkHu(p);
          if (r1.canHu !== r2.canHu || r1.huCount !== r2.huCount) throw new Error('不一致');
          return '一致 ✓';
        }}
      ];
      for (const t of tests) {
        try { log('  ✅ ' + t.name + ': ' + t.fn(), 'pass'); passed++; }
        catch(e) { log('  ❌ ' + t.name + ': ' + e.message, 'fail'); addIssue(t.name, e.message); failed++; }
      }
      log('\n单元测试: ' + passed + '通过, ' + failed + '失败', failed > 0 ? 'fail' : 'pass');
      return { passed, failed };
    }

    function simulateRound(roundNum) {
      return new Promise((resolve) => {
        const rd = { roundNumber:roundNum, winner:null, winnerIndex:-1, huType:null, method:null, huCount:0, isLiuJu:false, violations:[] };
        drawnCardTracker = {}; chiPengTracker = {};
        const deck = shuffleDeck(createDeck());
        gameState.deck = deck;
        gameState.lastDiscardedCard = null;
        gameState.lastDiscardPlayerIndex = -1;
        gameState.currentPlayerIndex = gameState.dealerIndex;
        gameState.canChi = false; gameState.canPeng = false; gameState.canZhao = false; gameState.canHu = false;
        gameState.skipDraw = false; gameState.isDrawing = false;
        gameState.isHandlingHu = false; gameState.isStartingRound = false;
        gameState.isLiuJuHandled = false; gameState.isClosingMessage = false; gameState.isClosingHuMessage = false;
        for (const p of gameState.players) { p.hand=[]; p.melds=[]; p.discards=[]; p.piao=0; p.isTing=false; }
        const hc = [19,19,19]; hc[gameState.dealerIndex] = 20;
        for (let i=0;i<3;i++) { for(let j=0;j<hc[i];j++) gameState.players[i].hand.push(deck.pop()); gameState.players[i].hand=sortHand(gameState.players[i].hand); }

        let turns = 0; const maxT = 300; let ended = false;

        function step() {
          if (ended || testShouldStop) { resolve(rd); return; }
          if (turns >= maxT || gameState.deck.length === 0) { rd.isLiuJu = true; ended = true; resolve(rd); return; }
          turns++;
          const pi = gameState.currentPlayerIndex;
          const p = gameState.players[pi];
          const isDFT = pi === gameState.dealerIndex && p.hand.length === 20;
          let drawn = null;
          if (!gameState.skipDraw && !isDFT && gameState.deck.length > 0) {
            drawn = gameState.deck.pop();
            p.hand.push(drawn); p.hand = sortHand(p.hand);
            if (p.type === 'ai') trackDrawnCard(pi, drawn);
          }
          gameState.skipDraw = false;
          const hr = checkHu(p);
          if (hr.canHu) {
            rd.winner = p.name; rd.winnerIndex = pi; rd.huType = hr.huType?.name||'未知';
            rd.huCount = hr.huCount; rd.method = drawn ? 'zimo' : 'dianpao';
            ended = true; resolve(rd); return;
          }
          p.isTing = checkTing(p).isTing;
          const di = selectAIDiscard(p);
          if (di < 0 || di >= p.hand.length) { gameState.currentPlayerIndex = (pi+1)%3; gameState.lastDiscardedCard=null; setTimeout(step,1); return; }
          const dc = p.hand[di];
          if (p.type === 'ai') {
            const vs = checkDiscardViolation(pi, dc);
            for (const v of vs) rd.violations.push({ playerIdx:pi, player:p.name, card:dc.character, type:v.type, message:v.message });
          }
          p.hand.splice(di,1); p.discards.push(dc);
          gameState.lastDiscardedCard = dc; gameState.lastDiscardPlayerIndex = pi;
          clearCaches();

          let handled = false;
          for (let ni=1;ni<=3&&!handled;ni++) {
            const ri = (pi+ni)%3; if(ri===pi) continue;
            const rp = gameState.players[ri];
            const rhr = checkHu(rp);
            if (rhr.canHu) {
              rd.winner=rp.name; rd.winnerIndex=ri; rd.huType=rhr.huType?.name||'未知';
              rd.huCount=rhr.huCount; rd.method='dianpao'; ended=true; resolve(rd); return;
            }
            if (rp.type==='ai' && !handled) {
              const zhaoCards = rp.hand.filter(c=>c.character===dc.character);
              if (zhaoCards.length>=3) {
                const zm={type:'quartet',source:'zhao',cards:[dc,...zhaoCards.slice(0,3)]};
                rp.melds.push(zm);
                for(let k=0;k<3;k++){const zi=rp.hand.findIndex(c=>c.id===zhaoCards[k].id);if(zi>=0)rp.hand.splice(zi,1);}
                trackChiPeng(ri,zm); gameState.currentPlayerIndex=ri; gameState.skipDraw=true; handled=true;
              }
              if(!handled){
                const pengCards=rp.hand.filter(c=>c.character===dc.character);
                if(pengCards.length>=2 && shouldAIPeng(rp,dc,ri)){
                  const pm={type:'triplet',source:'peng',cards:[dc,...pengCards.slice(0,2)]};
                  rp.melds.push(pm);
                  for(let k=0;k<2;k++){const pi2=rp.hand.findIndex(c=>c.id===pengCards[k].id);if(pi2>=0)rp.hand.splice(pi2,1);}
                  trackChiPeng(ri,pm); gameState.currentPlayerIndex=ri; gameState.skipDraw=true; handled=true;
                }
              }
              if(!handled){
                const sameS=rp.hand.filter(c=>c.sentence===dc.sentence);
                const posSet=new Set(sameS.map(c=>c.position));
                const canChi=(dc.position===0&&posSet.has(1)&&posSet.has(2))||(dc.position===1&&posSet.has(0)&&posSet.has(2))||(dc.position===2&&posSet.has(0)&&posSet.has(1));
                if(canChi && shouldAIChi(rp,dc,ri)){
                  let chiC=null;
                  if(dc.position===0){const c1=sameS.find(c=>c.position===1);const c2=sameS.find(c=>c.position===2);if(c1&&c2)chiC=[c1,c2];}
                  else if(dc.position===1){const c0=sameS.find(c=>c.position===0);const c2=sameS.find(c=>c.position===2);if(c0&&c2)chiC=[c0,c2];}
                  else if(dc.position===2){const c0=sameS.find(c=>c.position===0);const c1=sameS.find(c=>c.position===1);if(c0&&c1)chiC=[c0,c1];}
                  if(chiC){
                    const cm={type:'sequence',source:'chi',cards:[dc,...chiC]};
                    rp.melds.push(cm);
                    for(const cc of chiC){const ci=rp.hand.findIndex(c=>c.id===cc.id);if(ci>=0)rp.hand.splice(ci,1);}
                    trackChiPeng(ri,cm); gameState.currentPlayerIndex=ri; gameState.skipDraw=true; handled=true;
                  }
                }
              }
            }
          }
          if(!handled) gameState.currentPlayerIndex=(pi+1)%3;
          setTimeout(step, 1);
        }
        step();
      });
    }

    async function runFullGameSimulation() {
      log('\n═══════════════════════════════════════', 'dim');
      log('  阶段2: 完整游戏模拟', 'info');
      log('═══════════════════════════════════════', 'dim');
      const totalRounds = parseInt(document.getElementById('testRounds').value);
      const sessions = Math.ceil(totalRounds / 8);
      let cur = 0;
      for (let s=0; s<sessions && !testShouldStop; s++) {
        setupTestGameState(); gameState.dealerIndex = s % 3;
        for (let r=1; r<=8 && cur<totalRounds && !testShouldStop; r++) {
          cur++; updateProgress(cur, totalRounds);
          gameState.roundNumber = r;
          log('  📋 第' + r + '/8局', 'info');
          const rd = await simulateRound(r);
          testResults.completed++;
          if (rd.isLiuJu) { testResults.liujuRounds++; log('    📛 流局', 'warn'); }
          else if (rd.winner) {
            testResults.huRounds++; testResults.totalHuCount += rd.huCount;
            if (rd.winnerIndex===1) testResults.playerHuCount++; else testResults.aiHuCount++;
            log('    🎉 ' + rd.winner + ' ' + (rd.method==='zimo'?'自摸':'点炮') + ' ' + rd.huType + ' ' + rd.huCount + '胡', 'pass');
          }
          for (const v of rd.violations) {
            log('    ❌ ' + v.message, 'fail');
            addIssue('AI出牌逻辑 - ' + v.type, v.message);
          }
          testResults.roundResults.push(rd); updateStats();
          await sleep(getSpeedDelay());
        }
        if (cur >= totalRounds) break;
        gameState.dealerIndex = (gameState.dealerIndex+1) % 3;
      }
      log('模拟完成: ' + testResults.completed + '局, ' + testResults.huRounds + '胡, ' + testResults.liujuRounds + '流局', 'info');
    }

    async function runAIStressTest() {
      log('\n═══════════════════════════════════════', 'dim');
      log('  阶段3: AI出牌压力测试(200次)', 'info');
      log('═══════════════════════════════════════', 'dim');
      let vc = 0; const tc = 200;
      const chars = '上大人丘乙己化三千七十土尔小生八九子佳作亡福禄寿';
      for (let i=0; i<tc && !testShouldStop; i++) {
        const hc = []; for(let j=0;j<13;j++) hc.push(chars[Math.floor(Math.random()*chars.length)]);
        const hand = createHand(hc.join(''));
        const dc = createCard(chars[Math.floor(Math.random()*chars.length)]);
        hand.push(dc);
        drawnCardTracker={}; chiPengTracker={}; trackDrawnCard(0,dc);
        const idx = selectAIDiscardHard({name:'AI',hand,melds:[],discards:[],isTing:false});
        if(idx>=0&&idx<hand.length){ const dd=hand[idx]; const vs=checkDiscardViolation(0,dd); if(vs.length>0){vc++;if(vc<=5)log('  ❌ #'+(i+1)+': '+vs[0].message,'fail');} }
      }
      drawnCardTracker={}; chiPengTracker={};
      const rate=(vc/tc*100).toFixed(1);
      log('压力测试: '+tc+'次, '+vc+'次违规('+rate+'%)', vc>0?'fail':'pass');
      if(vc>0) addIssue('AI丢弃刚摸牌','压力测试'+tc+'次中'+vc+'次违规('+rate+'%)', vc>10?'error':'warn');
    }

    async function startTests() {
      if(testRunning) return;
      testRunning=true; testShouldStop=false;
      document.getElementById('runBtn').disabled=true;
      document.getElementById('stopBtn').disabled=false;
      testResults={total:0,completed:0,huRounds:0,liujuRounds:0,errors:0,aiHuCount:0,playerHuCount:0,totalHuCount:0,issues:[],roundResults:[]};
      updateStats(); renderIssues();
      const totalRounds=parseInt(document.getElementById('testRounds').value);
      testResults.total=totalRounds;
      log('╔═══════════════════════════════════════╗','info');
      log('║   UI自动化逻辑测试 开始              ║','info');
      log('╚═══════════════════════════════════════╝','info');
      log('难度: '+document.getElementById('testDifficulty').value,'info');
      log('局数: '+totalRounds,'info');
      const t0=Date.now();
      try {
        await runLogicUnitTests();
        if(!testShouldStop) await runAIStressTest();
        if(!testShouldStop) await runFullGameSimulation();
      } catch(e) { log('💥 异常: '+e.message,'fail'); log(e.stack,'fail'); addIssue('异常',e.message); }
      const elapsed=Date.now()-t0;
      log('\n╔═══════════════════════════════════════╗','info');
      log('║   UI自动化逻辑测试 完成              ║','info');
      log('╚═══════════════════════════════════════╝','info');
      log('耗时: '+(elapsed/1000).toFixed(1)+'秒','info');
      log('完成: '+testResults.completed+'局, 胡:'+testResults.huRounds+', 流局:'+testResults.liujuRounds,'info');
      log('逻辑错误: '+testResults.errors, testResults.errors>0?'fail':'pass');
      if(testResults.issues.length===0) log('\n🎉 所有测试通过！','pass');
      else log('\n⚠️ 检测到'+testResults.issues.length+'个逻辑问题','warn');
      updateProgress(100,100); updateStats(); renderIssues();
      testRunning=false;
      document.getElementById('runBtn').disabled=false;
      document.getElementById('stopBtn').disabled=true;
    }

    function stopTests() {
      testShouldStop=true; log('⏹ 停止','warn');
      document.getElementById('runBtn').disabled=false;
      document.getElementById('stopBtn').disabled=true;
      testRunning=false;
    }
  </script>
