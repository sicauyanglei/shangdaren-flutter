<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流局显示测试</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body {
      background: #1a1a2e;
      color: white;
      font-family: Arial, sans-serif;
      width: 640px;
      height: 360px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: 16px;
      margin: 5px 0;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 3px;
    }
    button:hover {
      background: #357abd;
    }
    #testControls {
      position: absolute;
      top: 5px;
      right: 5px;
      z-index: 999;
    }

    /* message-area styles from index.html */
    .message-area {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      padding: 40px 45px 30px 45px;
      border-radius: 16px;
      text-align: center;
      z-index: 1000;
      display: none;
      border: 3px solid #ffd700;
      box-shadow: 0 0 40px rgba(255,215,0,0.4);
      max-height: 85vh;
      overflow-y: auto;
      width: 90%;
      max-width: 500px;
      box-sizing: border-box;
    }

    .message-area.show {
      display: block;
    }

    .message-title {
      font-size: 24px;
      color: #ffd700;
      margin-bottom: 15px;
    }

    .message-content {
      font-size: 16px;
      color: white;
    }

    .btn {
      padding: 10px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1a2e;
      font-weight: bold;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    /* liuju styles */
    .liuju-hands {
      margin-top: 8px;
      padding: 6px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .liuju-player-hand {
      margin: 4px 0;
      padding: 4px 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .liuju-player-name {
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 2px;
      font-size: 11px;
    }

    .liuju-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      align-items: center;
    }

    .liuju-card-img {
      width: 18px;
      height: auto;
      border-radius: 2px;
      box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    .liuju-card-img.jing {
      box-shadow: 0 0 3px rgba(211, 47, 47, 0.6);
    }

    .liuju-melds {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      margin-left: 6px;
      padding-left: 4px;
      border-left: 2px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <h1>流局显示测试 (横屏)</h1>
  <div id="testControls">
    <button onclick="testLiuJuDisplay()">测试流局显示</button>
    <button onclick="closeMessage()">关闭</button>
  </div>

  <!-- Required HTML elements -->
  <div id="messageArea" class="message-area">
    <button class="close-btn" onclick="closeMessage()">×</button>
    <div class="message-title" id="messageTitle"></div>
    <div class="message-content" id="messageContent"></div>
    <button class="btn btn-primary" onclick="closeMessage()">确定</button>
  </div>

  <script src="game.js"></script>
  <script>
    // 初始化游戏状态
    function initGameStateForTest() {
      const cardMap = {
        '上': {s:1,p:0},'大':{s:1,p:1},'人':{s:1,p:2},
        '丘':{s:2,p:0},'乙':{s:2,p:1},'己':{s:2,p:2},
        '化':{s:3,p:0},'三':{s:3,p:1},'千':{s:3,p:2},
        '七':{s:4,p:0},'十':{s:4,p:1},'土':{s:4,p:2},
        '尔':{s:5,p:0},'小':{s:5,p:1},'生':{s:5,p:2},
        '八':{s:6,p:0},'九':{s:6,p:1},'子':{s:6,p:2},
        '佳':{s:7,p:0},'作':{s:7,p:1},'亡':{s:7,p:2},
        '福':{s:8,p:0},'禄':{s:8,p:1},'寿':{s:8,p:2}
      };

      function createCard(char) {
        const info = cardMap[char] || {s:0,p:0};
        return { character: char, sentence: info.s, position: info.p, id: Math.random().toString(36).substr(2, 9) };
      }

      // 初始化gameState
      window.gameState = {
        players: [
          { name: '玩家1(我)', type: 'human', hand: [], melds: [], discards: [], isTing: false, piao: 0, score: 0 },
          { name: '对手1', type: 'ai', hand: [], melds: [], discards: [], isTing: false, piao: 0, score: 0 },
          { name: '对手2', type: 'ai', hand: [], melds: [], discards: [], isTing: false, piao: 0, score: 0 }
        ],
        roundNumber: 3,
        testMode: false,
        isLiuJuHandled: false,
        isClosingMessage: false
      };

      // 给每个玩家发一些手牌
      gameState.players[0].hand = ['上','大','人','丘','乙','己','化','三','千'].map(c => createCard(c));
      gameState.players[1].hand = ['七','十','土','尔','小','生','八','九','子'].map(c => createCard(c));
      gameState.players[2].hand = ['佳','作','亡','福','禄','寿','上','大','人'].map(c => createCard(c));

      // 给玩家1加一个组合牌
      gameState.players[0].melds = [
        { type: 'quartet', cards: ['三','三','三','三'].map(c => createCard(c)), huValue: 4 },
        { type: 'sequence', cards: ['尔','小','生'].map(c => createCard(c)), huValue: 1 },
        { type: 'triplet', cards: ['八','八','八'].map(c => createCard(c)), huValue: 2 }
      ];

      console.log('gameState initialized:', gameState);
    }

    function testLiuJuDisplay() {
      if (!window.gameState || !window.gameState.players) {
        initGameStateForTest();
      }
      console.log('Testing liuju display with players:', gameState.players);
      showMessage('流局', '牌堆已空，本局结束', true);
    }
  </script>
</body>
</html>
