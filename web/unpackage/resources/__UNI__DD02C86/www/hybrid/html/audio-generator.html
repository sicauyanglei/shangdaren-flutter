<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频生成工具 - 上大人游戏</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      padding: 20px;
      background: #1a1a2e;
      color: #fff;
    }
    h1 { color: #ffd700; }
    h2 { color: #87ceeb; margin-top: 30px; }
    .container { max-width: 900px; margin: 0 auto; }
    .btn {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }
    .btn-primary { background: #4CAF50; color: white; }
    .btn-secondary { background: #2196F3; color: white; }
    .btn-danger { background: #f44336; color: white; }
    .btn-male { background: #2196F3; color: white; }
    .btn-female { background: #E91E63; color: white; }
    .btn:hover { opacity: 0.8; }
    .status { margin: 10px 0; padding: 10px; background: #333; border-radius: 5px; }
    .audio-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .audio-item {
      background: #333;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      min-width: 100px;
    }
    .audio-item span { display: block; margin: 5px 0; }
    .progress { 
      width: 100%; 
      height: 20px; 
      background: #333; 
      border-radius: 10px;
      margin: 10px 0;
    }
    .progress-bar {
      height: 100%;
      background: #4CAF50;
      border-radius: 10px;
      transition: width 0.3s;
    }
    #log {
      background: #000;
      padding: 10px;
      border-radius: 5px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .voice-select {
      padding: 10px;
      margin: 10px 0;
      background: #333;
      border-radius: 5px;
    }
    .voice-select select {
      padding: 5px 10px;
      font-size: 16px;
      margin-left: 10px;
    }
    .tabs {
      display: flex;
      margin-bottom: 10px;
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      background: #333;
      border: none;
      color: #fff;
      font-size: 16px;
    }
    .tab.active {
      background: #4CAF50;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 音频生成工具</h1>
    <p>此工具用于生成上大人游戏所需的所有语音音频文件（男声和女声两个版本）。</p>
    
    <h2>1. 检查语音合成支持</h2>
    <button class="btn btn-primary" onclick="checkVoices()">检查可用语音</button>
    <div id="voiceStatus" class="status"></div>
    
    <h2>2. 选择声音类型</h2>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('male')">👨 男声版本</button>
      <button class="tab" onclick="switchTab('female')">👩 女声版本</button>
    </div>
    
    <div id="maleTab" class="tab-content active">
      <div class="voice-select">
        <label>选择男声语音：</label>
        <select id="maleVoice"></select>
      </div>
      <button class="btn btn-male" onclick="generateAllAudio('male')">生成男声音频</button>
    </div>
    
    <div id="femaleTab" class="tab-content">
      <div class="voice-select">
        <label>选择女声语音：</label>
        <select id="femaleVoice"></select>
      </div>
      <button class="btn btn-female" onclick="generateAllAudio('female')">生成女声音频</button>
    </div>
    
    <div class="progress">
      <div id="progressBar" class="progress-bar" style="width: 0%"></div>
    </div>
    <div id="progressText">准备就绪</div>
    
    <button class="btn btn-danger" onclick="stopGeneration()">停止生成</button>
    
    <h2>3. 下载音频文件</h2>
    <p>生成完成后，点击下载按钮保存到 audio 文件夹：</p>
    <ul>
      <li>男声文件保存到: audio/male/</li>
      <li>女声文件保存到: audio/female/</li>
    </ul>
    <div id="audioList" class="audio-list"></div>
    
    <h2>4. 日志</h2>
    <div id="log"></div>
  </div>

  <script>
    // 所有需要生成的音频
    const audioTexts = {
      // 游戏操作
      'chi': '吃',
      'peng': '碰',
      'zhao': '招',
      'hu': '胡',
      'zimo': '自摸',
      'chupai': '出牌',
      
      // 胡牌类型
      'kuhu': '枯胡',
      'qingkuhu': '清枯胡',
      'kuchongtaika': '枯重台卡',
      'kuchongtaihu': '枯重台胡',
      'qingkutaika': '清枯台卡',
      'shidui': '十对',
      'heiyuan': '黑元',
      'hongyuan': '红元',
      'kahu': '卡胡',
      'putonghu': '普通胡',
      'taika': '台卡',
      'taihu': '台胡',
      'chongtaika': '重台卡',
      'chongtaihu': '重台胡',
      
      // 24个字牌
      'shang': '上',
      'da': '大',
      'ren': '人',
      'qiu': '丘',
      'yi': '乙',
      'ji': '己',
      'hua': '化',
      'san': '三',
      'qian': '千',
      'qi': '七',
      'shi': '十',
      'tu': '土',
      'er': '尔',
      'xiao': '小',
      'sheng': '生',
      'ba': '八',
      'jiu': '九',
      'zi': '子',
      'jia': '佳',
      'zuo': '作',
      'wang': '亡',
      'fu': '福',
      'lu': '禄',
      'shou': '寿'
    };
    
    let isGenerating = false;
    let generatedAudios = { male: {}, female: {} };
    let maleVoices = [];
    let femaleVoices = [];
    
    function log(msg) {
      const logDiv = document.getElementById('log');
      logDiv.textContent += msg + '\n';
      logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    function switchTab(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      
      if (type === 'male') {
        document.querySelector('.tab:first-child').classList.add('active');
        document.getElementById('maleTab').classList.add('active');
      } else {
        document.querySelector('.tab:last-child').classList.add('active');
        document.getElementById('femaleTab').classList.add('active');
      }
    }
    
    function checkVoices() {
      const statusDiv = document.getElementById('voiceStatus');
      
      if (!('speechSynthesis' in window)) {
        statusDiv.innerHTML = '<span style="color: red;">❌ 浏览器不支持语音合成</span>';
        return;
      }
      
      const voices = speechSynthesis.getVoices();
      
      if (voices.length === 0) {
        statusDiv.innerHTML = '<span style="color: orange;">⏳ 等待语音列表加载...</span>';
        speechSynthesis.onvoiceschanged = () => checkVoices();
        return;
      }
      
      // 分类男声和女声
      maleVoices = [];
      femaleVoices = [];
      
      voices.forEach(v => {
        const name = v.name.toLowerCase();
        // 判断男声
        if (name.includes('male') || name.includes('男') || name.includes('david') || 
            name.includes('james') || name.includes('daniel') || name.includes('google uk english male')) {
          maleVoices.push(v);
        }
        // 判断女声
        else if (name.includes('female') || name.includes('女') || name.includes('samantha') ||
                 name.includes('victoria') || name.includes('karen') || name.includes('moira') ||
                 name.includes('fiona') || name.includes('tessa') || name.includes('google uk english female')) {
          femaleVoices.push(v);
        }
      });
      
      // 中文语音
      const zhVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('CN'));
      
      // 中文语音根据名称判断男女
      zhVoices.forEach(v => {
        const name = v.name.toLowerCase();
        if (name.includes('female') || name.includes('女') || name.includes('yaoyao') || 
            name.includes('tingting') || name.includes('xiaoxiao')) {
          femaleVoices.push(v);
        } else {
          maleVoices.push(v);
        }
      });
      
      // 如果没有分类成功，把所有中文语音都加入两个列表
      if (maleVoices.length === 0 && zhVoices.length > 0) {
        maleVoices = zhVoices;
      }
      if (femaleVoices.length === 0 && zhVoices.length > 0) {
        femaleVoices = zhVoices;
      }
      
      // 更新下拉列表
      const maleSelect = document.getElementById('maleVoice');
      const femaleSelect = document.getElementById('femaleVoice');
      
      maleSelect.innerHTML = '';
      maleVoices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        maleSelect.appendChild(opt);
      });
      
      femaleSelect.innerHTML = '';
      femaleVoices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        femaleSelect.appendChild(opt);
      });
      
      let html = `<span style="color: green;">✅ 找到 ${voices.length} 个语音</span><br>`;
      html += `<span style="color: green;">✅ 中文语音: ${zhVoices.length} 个</span><br>`;
      html += `<span style="color: #2196F3;">👨 男声语音: ${maleVoices.length} 个</span><br>`;
      html += `<span style="color: #E91E63;">👩 女声语音: ${femaleVoices.length} 个</span>`;
      
      statusDiv.innerHTML = html;
      log('语音检查完成');
    }
    
    window.onload = () => {
      checkVoices();
      speechSynthesis.onvoiceschanged = checkVoices;
    };
    
    async function generateAllAudio(type) {
      if (isGenerating) return;
      isGenerating = true;
      
      const keys = Object.keys(audioTexts);
      const total = keys.length;
      const voiceSelect = type === 'male' ? document.getElementById('maleVoice') : document.getElementById('femaleVoice');
      const voices = type === 'male' ? maleVoices : femaleVoices;
      const selectedVoice = voices[voiceSelect.value];
      
      log(`开始生成 ${type === 'male' ? '男声' : '女声'} ${total} 个音频文件...`);
      log(`使用语音: ${selectedVoice.name}`);
      
      for (let i = 0; i < total && isGenerating; i++) {
        const key = keys[i];
        const text = audioTexts[key];
        
        updateProgress((i + 1) / total * 100, `正在生成: ${text} (${i + 1}/${total})`);
        
        try {
          await generateAudio(type, key, text, selectedVoice);
        } catch (e) {
          log(`❌ 生成失败 ${key}: ${e.message}`);
        }
        
        await new Promise(resolve => setTimeout(resolve, 300));
      }
      
      isGenerating = false;
      updateProgress(100, '生成完成！');
      log(`所有 ${type === 'male' ? '男声' : '女声'} 音频生成完成！`);
      
      showDownloadButtons(type);
    }
    
    function stopGeneration() {
      isGenerating = false;
      log('已停止生成');
    }
    
    function updateProgress(percent, text) {
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressText').textContent = text;
    }
    
    function generateAudio(type, key, text, voice) {
      return new Promise((resolve, reject) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = voice.lang;
        utterance.voice = voice;
        utterance.rate = 0.9;
        utterance.pitch = type === 'male' ? 0.8 : 1.2;
        utterance.volume = 1.0;
        
        utterance.onend = () => {
          generatedAudios[type][key] = text;
          log(`✅ 生成成功: ${type}/${key} = "${text}"`);
          resolve();
        };
        
        utterance.onerror = (e) => {
          reject(e);
        };
        
        speechSynthesis.speak(utterance);
      });
    }
    
    function showDownloadButtons(type) {
      const listDiv = document.getElementById('audioList');
      listDiv.innerHTML = '';
      
      const keys = Object.keys(generatedAudios[type]);
      
      keys.forEach(key => {
        const text = generatedAudios[type][key];
        const item = document.createElement('div');
        item.className = 'audio-item';
        item.innerHTML = `
          <span>${text}</span>
          <button class="btn btn-secondary" onclick="playAudio('${type}', '${key}', '${text}')">播放</button>
          <button class="btn btn-primary" onclick="downloadAudio('${type}', '${key}', '${text}')">下载</button>
        `;
        listDiv.appendChild(item);
      });
      
      // 添加一键下载所有按钮
      const downloadAll = document.createElement('button');
      downloadAll.className = 'btn btn-primary';
      downloadAll.style.marginTop = '20px';
      downloadAll.textContent = `一键下载所有${type === 'male' ? '男声' : '女声'}音频`;
      downloadAll.onclick = () => downloadAllAudio(type);
      listDiv.appendChild(downloadAll);
    }
    
    async function playAudio(type, key, text) {
      const voiceSelect = type === 'male' ? document.getElementById('maleVoice') : document.getElementById('femaleVoice');
      const voices = type === 'male' ? maleVoices : femaleVoices;
      const selectedVoice = voices[voiceSelect.value];
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = selectedVoice.lang;
      utterance.voice = selectedVoice;
      utterance.rate = 0.9;
      utterance.pitch = type === 'male' ? 0.8 : 1.2;
      
      speechSynthesis.speak(utterance);
    }
    
    async function downloadAudio(type, key, text) {
      // 使用Web Audio API生成简单的音效文件
      const sampleRate = 22050;
      const duration = 1.0;
      
      // 根据文字设置不同频率
      const freqMap = {
        '吃': 523, '碰': 659, '招': 784, '胡': 880, '自摸': 1047, '出牌': 440,
        '上': 262, '大': 294, '人': 330, '丘': 349, '乙': 392, '己': 440,
        '化': 466, '三': 494, '千': 523, '七': 554, '十': 587, '土': 622,
        '尔': 659, '小': 698, '生': 740, '八': 784, '九': 831, '子': 880,
        '佳': 932, '作': 988, '亡': 1047, '福': 1109, '禄': 1175, '寿': 1245
      };
      
      const baseFreq = freqMap[text] || 440;
      // 男声频率较低，女声频率较高
      const freq = type === 'male' ? baseFreq * 0.8 : baseFreq * 1.2;
      
      const offlineCtx = new OfflineAudioContext(1, sampleRate * duration, sampleRate);
      const oscillator = offlineCtx.createOscillator();
      const gainNode = offlineCtx.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(offlineCtx.destination);
      
      oscillator.frequency.value = freq;
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0, 0);
      gainNode.gain.linearRampToValueAtTime(0.5, 0.05);
      gainNode.gain.linearRampToValueAtTime(0.3, 0.1);
      gainNode.gain.linearRampToValueAtTime(0, duration);
      
      oscillator.start(0);
      oscillator.stop(duration);
      
      const audioBuffer = await offlineCtx.startRendering();
      const wav = audioBufferToWav(audioBuffer);
      
      // 下载
      const blob = new Blob([wav], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${type}/${key}.wav`;
      a.click();
      URL.revokeObjectURL(url);
      
      log(`📥 下载: ${type}/${key}.wav`);
    }
    
    function audioBufferToWav(buffer) {
      const numChannels = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const format = 1;
      const bitDepth = 16;
      
      const bytesPerSample = bitDepth / 8;
      const blockAlign = numChannels * bytesPerSample;
      
      const data = buffer.getChannelData(0);
      const samples = data.length;
      const dataSize = samples * blockAlign;
      const bufferSize = 44 + dataSize;
      
      const arrayBuffer = new ArrayBuffer(bufferSize);
      const view = new DataView(arrayBuffer);
      
      writeString(view, 0, 'RIFF');
      view.setUint32(4, bufferSize - 8, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, format, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * blockAlign, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitDepth, true);
      writeString(view, 36, 'data');
      view.setUint32(40, dataSize, true);
      
      let offset = 44;
      for (let i = 0; i < samples; i++) {
        const sample = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
        offset += 2;
      }
      
      return arrayBuffer;
    }
    
    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }
    
    async function downloadAllAudio(type) {
      const keys = Object.keys(generatedAudios[type]);
      log(`开始下载所有${type === 'male' ? '男声' : '女声'}音频...`);
      
      for (let i = 0; i < keys.length; i++) {
        const key = keys[i];
        const text = generatedAudios[type][key];
        
        await downloadAudio(type, key, text);
        await new Promise(resolve => setTimeout(resolve, 500));
      }
      
      log(`所有${type === 'male' ? '男声' : '女声'}音频下载完成！`);
    }
  </script>
</body>
</html>
