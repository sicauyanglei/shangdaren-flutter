<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-orientation" content="landscape">
  <title>上大人字牌 - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
      background: radial-gradient(ellipse at center, #1a5c2e 0%, #0d3d1a 50%, #062810 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: rgba(0, 0, 0, 0.4);
      border: 3px solid #8bc34a;
      border-radius: 20px;
      padding: 40px;
      width: 400px;
      max-width: 90%;
    }

    .login-title {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 16px;
      margin-bottom: 8px;
      color: #ccc;
    }

    .form-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 16px;
      border: 2px solid #4a7c59;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: #8bc34a;
    }

    .form-input::placeholder {
      color: #888;
    }

    .sms-row {
      display: flex;
      gap: 10px;
    }

    .sms-row .form-input {
      flex: 1;
    }

    .sms-btn {
      padding: 12px 15px;
      font-size: 14px;
      border: 2px solid #4a7c59;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      white-space: nowrap;
      min-width: 100px;
    }

    .sms-btn:hover:not(:disabled) {
      border-color: #8bc34a;
      background: rgba(139, 195, 74, 0.2);
    }

    .sms-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      margin-top: 10px;
      background: linear-gradient(145deg, #4caf50, #388e3c);
      color: white;
    }

    .submit-btn:hover {
      background: linear-gradient(145deg, #5cbf60, #48a64c);
    }

    .guest-btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #4a7c59;
      border-radius: 10px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      margin-top: 15px;
    }

    .guest-btn:hover {
      border-color: #8bc34a;
      color: #fff;
    }

    .error-msg {
      color: #f44336;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    .success-msg {
      color: #4caf50;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="login-title">🏮 上大人字牌</h1>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">手机号</label>
        <input type="tel" class="form-input" id="phoneInput" placeholder="请输入手机号" required maxlength="11">
      </div>
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="sms-row">
          <input type="text" class="form-input" id="codeInput" placeholder="请输入验证码" required maxlength="6">
          <button type="button" class="sms-btn" id="smsBtn" onclick="sendSms()">发送验证码</button>
        </div>
      </div>
      <button type="submit" class="submit-btn">登录</button>
      <button type="button" class="guest-btn" onclick="playAsGuest()">游客登录(不保存进度)</button>
      <div id="loginError" class="error-msg"></div>
    </form>
  </div>

  <script>
    const API_BASE = 'http://localhost:8081';
    let smsCountdown = 0;
    let smsTimer = null;

    async function sendSms() {
      const phoneInput = document.getElementById('phoneInput');
      const phone = phoneInput.value.trim();
      const smsBtn = document.getElementById('smsBtn');
      const errorEl = document.getElementById('loginError');

      errorEl.textContent = '';

      if (!/^1[3-9]\d{9}$/.test(phone)) {
        errorEl.textContent = '请输入正确的手机号';
        return;
      }

      smsBtn.disabled = true;
      smsCountdown = 60;
      smsBtn.textContent = `${smsCountdown}秒后重发`;

      smsTimer = setInterval(() => {
        smsCountdown--;
        if (smsCountdown <= 0) {
          clearInterval(smsTimer);
          smsBtn.disabled = false;
          smsBtn.textContent = '发送验证码';
        } else {
          smsBtn.textContent = `${smsCountdown}秒后重发`;
        }
      }, 1000);

      try {
        const response = await fetch(`${API_BASE}/api/player/send-sms`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });

        const data = await response.json();

        if (data.success) {
          console.log('SMS sent successfully');
        } else {
          errorEl.textContent = data.message || '发送验证码失败';
          clearInterval(smsTimer);
          smsBtn.disabled = false;
          smsBtn.textContent = '发送验证码';
        }
      } catch (e) {
        errorEl.textContent = '网络错误，请检查服务器是否启动';
        clearInterval(smsTimer);
        smsBtn.disabled = false;
        smsBtn.textContent = '发送验证码';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const phone = document.getElementById('phoneInput').value.trim();
      const code = document.getElementById('codeInput').value.trim();
      const errorEl = document.getElementById('loginError');

      errorEl.textContent = '';

      try {
        const response = await fetch(`${API_BASE}/api/player/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('my_player_id', data.playerId);
          localStorage.setItem('player_name', data.username);
          localStorage.setItem('player_phone', phone);
          window.location.href = 'lobby.html';
        } else {
          errorEl.textContent = data.message || '登录失败';
        }
      } catch (e) {
        errorEl.textContent = '网络错误，请检查服务器是否启动';
      }
    }

    function playAsGuest() {
      const guestName = '游客' + Math.floor(Math.random() * 10000);
      localStorage.setItem('player_name', guestName);
      localStorage.setItem('my_player_id', 'guest_' + Date.now().toString(36));
      localStorage.setItem('auth_token', 'guest_token');
      window.location.href = 'lobby.html';
    }

    if (localStorage.getItem('auth_token')) {
      window.location.href = 'lobby.html';
    }
  </script>
</body>
</html>
