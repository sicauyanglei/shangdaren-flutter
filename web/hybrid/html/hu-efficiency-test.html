<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>困难模式胡牌效率测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    .test-panel { background: #16213e; padding: 20px; border-radius: 10px; margin: 10px 0; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
    .stat-box { background: #0f3460; padding: 15px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 2em; font-weight: bold; color: #4ade80; }
    .stat-label { color: #94a3b8; margin-top: 5px; }
    button { background: #4ade80; color: #1a1a2e; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px; }
    button:hover { background: #22c55e; }
    button:disabled { background: #666; cursor: not-allowed; }
    .log { background: #0f3460; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .log-entry { margin: 3px 0; }
    .log-zimo { color: #4ade80; }
    .log-dianpao { color: #f87171; }
    .progress { background: #0f3460; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
    .progress-bar { background: #4ade80; height: 100%; transition: width 0.3s; }
    .param-row { display: flex; gap: 10px; margin: 5px 0; align-items: center; }
    .param-row label { width: 200px; }
    .param-row input { width: 80px; background: #1a1a2e; border: 1px solid #4ade80; color: #4ade80; padding: 5px; border-radius: 3px; }
    .param-row span { color: #94a3b8; font-size: 12px; }
  </style>
</head>
<body>
  <h1>困难模式胡牌效率专项测试</h1>

  <div class="test-panel">
    <h3>参数调整 (自动应用到game.js)</h3>
    <div class="param-row">
      <label>tingProbWeight (听牌概率权重):</label>
      <input type="number" id="p-ting-weight" value="0.55" step="0.05" min="0.1" max="1">
      <span>影响听牌概率计算，值越高AI越追求听牌</span>
    </div>
    <div class="param-row">
      <label>chiThreshold (吃牌期望阈值):</label>
      <input type="number" id="p-chi" value="0.45" step="0.05" min="0.1" max="1">
      <span>越低AI越积极吃牌</span>
    </div>
    <div class="param-row">
      <label>pengThreshold (碰牌期望阈值):</label>
      <input type="number" id="p-peng" value="0.35" step="0.05" min="0.1" max="1">
      <span>越低AI越积极碰牌</span>
    </div>
    <div class="param-row">
      <label>safetyWeight (听牌后安全牌权重):</label>
      <input type="number" id="p-safety" value="0.2" step="0.1" min="0" max="1">
      <span>越低AI越不保守，更追求胡牌</span>
    </div>
    <div class="param-row">
      <label>phaseLate (中后期调整):</label>
      <input type="number" id="p-phase-late" value="1.5" step="0.1" min="1" max="3">
      <span>中后期胡牌概率倍数</span>
    </div>
    <div class="param-row">
      <label>phaseEnd (终局调整):</label>
      <input type="number" id="p-phase-end" value="2.0" step="0.1" min="1" max="3">
      <span>终局胡牌概率倍数</span>
    </div>
    <div class="param-row">
      <label>baseProbRate (基础概率衰减):</label>
      <input type="number" id="p-base" value="0.055" step="0.005" min="0.01" max="0.2">
      <span>每向听数减少的概率，越低越激进</span>
    </div>
    <div class="param-row">
      <label>combinedWeight (组合概率权重):</label>
      <input type="number" id="p-combined" value="0.92" step="0.02" min="0.5" max="1">
      <span>组合概率权重，越高越追求牌型</span>
    </div>
    <div class="param-row">
      <label>sentencePenalty (句子保护惩罚):</label>
      <input type="number" id="p-penalty" value="40" step="10" min="0" max="100">
      <span>困难模式下破坏句子完整度的惩罚，越低越激进</span>
    </div>
    <button onclick="applyParams()">应用参数并开始测试</button>
    <button onclick="stopTest()">停止测试</button>
    <div class="progress">
      <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
    </div>
    <span id="progress-text">0 / 1000</span>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="s-games">0</div>
      <div class="stat-label">总局数</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="s-ai-rate">0%</div>
      <div class="stat-label">AI胡牌率</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="s-zimo">0%</div>
      <div class="stat-label">自摸率</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="s-dianpao">0%</div>
      <div class="stat-label">点炮率</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="s-avg-turns">0</div>
      <div class="stat-label">平均回合</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="s-avg-hu">0</div>
      <div class="stat-label">平均胡数</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="s-human">0</div>
      <div class="stat-label">人类胡</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="s-pais">0</div>
      <div class="stat-label">AI点炮</div>
    </div>
  </div>

  <div class="test-panel">
    <h3>最近日志</h3>
    <div class="log" id="log"></div>
  </div>

  <script src="game.js"></script>
  <script>
    let isRunning = false;
    let shouldStop = false;
    let testGames = 1000;

    const stats = {
      totalGames: 0,
      AIWinGames: 0,
      humanWinGames: 0,
      AIPais: 0,
      humanPais: 0,
      aiWinByZimo: 0,
      aiWinByPai: 0,
      totalZimo: 0,
      totalDianpao: 0,
      turnsToHu: [],
      huCounts: []
    };

    function log(msg, type='info') {
      const el = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry log-' + type;
      entry.textContent = new Date().toLocaleTimeString() + ' ' + msg;
      el.appendChild(entry);
      el.scrollTop = el.scrollHeight;
      while (el.children.length > 50) el.removeChild(el.firstChild);
    }

    function updateStats() {
      document.getElementById('s-games').textContent = stats.totalGames;
      const rate = stats.totalGames > 0 ? (stats.AIWinGames / stats.totalGames * 100).toFixed(1) : '0';
      document.getElementById('s-ai-rate').textContent = rate + '%';
      const zimo = stats.AIWinGames > 0 ? (stats.aiWinByZimo / stats.AIWinGames * 100).toFixed(1) : '0';
      document.getElementById('s-zimo').textContent = zimo + '%';
      const dp = stats.totalGames > 0 ? (stats.AIPais / stats.totalGames * 100).toFixed(1) : '0';
      document.getElementById('s-dianpao').textContent = dp + '%';
      const avgT = stats.turnsToHu.length > 0 ? (stats.turnsToHu.reduce((a,b)=>a+b,0) / stats.turnsToHu.length).toFixed(1) : '0';
      document.getElementById('s-avg-turns').textContent = avgT;
      const avgH = stats.huCounts.length > 0 ? (stats.huCounts.reduce((a,b)=>a+b,0) / stats.huCounts.length).toFixed(1) : '0';
      document.getElementById('s-avg-hu').textContent = avgH;
      document.getElementById('s-human').textContent = stats.humanWinGames;
      document.getElementById('s-pais').textContent = stats.humanPais;
      document.getElementById('progress-bar').style.width = (stats.totalGames / testGames * 100) + '%';
      document.getElementById('progress-text').textContent = stats.totalGames + ' / ' + testGames;
    }

    function initGame() {
      const CHARS = ['上','大','人','丘','乙','己','化','三','千','七','十','土','尔','小','生','八','九','子','佳','作','亡','福','禄','寿'];
      const deck = [];
      for (const c of CHARS) {
        for (let i = 0; i < 4) {
          deck.push({ character: c, sentence: getSentenceInfo(c).sentence, position: getSentenceInfo(c).position, id: Math.random().toString(36).substr(2,9) });
        }
      }
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }

      const names = ['AI-0', '人类', 'AI-1', 'AI-2'];
      gameState.players = names.map((n, idx) => ({
        name: n, hand: [], discards: [], melds: [], isTing: false, isAI: idx !== 1, piao: 0
      }));

      for (let i = 0; i < 16; i++) {
        for (let p = 0; p < 4; p++) {
          if (deck.length > 0) gameState.players[p].hand.push(deck.pop());
        }
      }

      gameState.deck = deck;
      gameState.currentPlayerIndex = Math.floor(Math.random() * 4);
      gameState.isGameOver = false;
      gameState.lastDiscardedCard = null;
      gameState.lastDiscardPlayerIndex = -1;

      for (const p of gameState.players) {
        const r = checkTing(p);
        p.isTing = r.isTing;
      }
    }

    function doTurn() {
      const p = gameState.players[gameState.currentPlayerIndex];
      if (gameState.deck.length > 0) {
        p.hand.push(gameState.deck.pop());
        const r = checkTing(p);
        p.isTing = r.isTing;
      }

      const hr = checkHu(p);
      if (hr.canHu) return { end: true, winner: gameState.currentPlayerIndex, type: 'zimo', hu: hr };

      if (p.isAI) {
        const idx = selectAIDiscard(p);
        if (idx >= 0 && idx < p.hand.length) {
          const card = p.hand.splice(idx, 1)[0];
          p.discards.push(card);
          gameState.lastDiscardedCard = card;
          gameState.lastDiscardPlayerIndex = gameState.currentPlayerIndex;

          for (let i = 0; i < 4; i++) {
            if (i === gameState.lastDiscardPlayerIndex) continue;
            const op = gameState.players[i];
            const hr2 = checkHu(op, card, true);
            if (op.isTing && hr2.canHu) {
              return { end: true, winner: i, type: 'dianpao', loser: gameState.currentPlayerIndex, hu: hr2 };
            }
          }
        }
      }

      gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % 4;
      return { end: false };
    }

    async function runGames() {
      initGame();
      let turn = 0;
      while (!gameState.isGameOver && turn < 200 && !shouldStop) {
        turn++;
        const result = doTurn();
        if (result.end) {
          if (result.type === 'zimo') {
            stats.totalZimo++;
            if (result.winner !== 1) {
              stats.AIWinGames++;
              stats.aiWinByZimo++;
              stats.turnsToHu.push(turn);
              stats.huCounts.push(result.hu.huCount);
            } else {
              stats.humanWinGames++;
            }
          } else {
            stats.totalDianpao++;
            if (result.winner !== 1) {
              stats.AIWinGames++;
              stats.aiWinByPai++;
              stats.AIPais++;
              stats.turnsToHu.push(turn);
              stats.huCounts.push(result.hu.huCount);
            } else {
              stats.humanWinGames++;
              stats.humanPais++;
            }
          }
          stats.totalGames++;
          return true;
        }
      }
      stats.totalGames++;
      return false;
    }

    async function startTest() {
      if (isRunning) return;
      isRunning = true;
      shouldStop = false;

      stats.totalGames = stats.AIWinGames = stats.humanWinGames = stats.AIPais = stats.humanPais = 0;
      stats.aiWinByZimo = stats.aiWinByPai = stats.totalZimo = stats.totalDianpao = 0;
      stats.turnsToHu = [];
      stats.huCounts = [];

      document.getElementById('log').innerHTML = '';
      log('开始测试 ' + testGames + ' 局...');

      for (let i = 0; i < testGames && !shouldStop; i++) {
        await runGames();
        if (i % 10 === 0) updateStats();
        if (i % 100 === 0) log('已完成 ' + i + ' 局');
      }

      isRunning = false;
      updateStats();
      log('测试完成!');
    }

    function stopTest() {
      shouldStop = true;
      log('停止测试');
    }

    function applyParams() {
      // 直接修改game.js中的变量（通过window访问）
      log('参数应用功能需要在game.js中手动修改后刷新页面');
      startTest();
    }

    // 初始化
    updateStats();
    log('测试页面已就绪，点击"应用参数并开始测试"开始');
  </script>
</body>
</html>
