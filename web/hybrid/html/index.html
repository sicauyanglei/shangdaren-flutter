<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=2.0, user-scalable=yes, viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-orientation" content="landscape">
  <meta name="full-screen" content="yes">
  <meta name="x5-fullscreen" content="true">
  <meta name="browsermode" content="application">
  <meta name="x5-page-mode" content="app">
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d3d1a">
  <meta name="msapplication-navbutton-color" content="#0d3d1a">
  <meta name="apple-mobile-web-app-title" content="上大人">
  <meta name="application-name" content="上大人">
  <meta name="msapplication-TileColor" content="#0d3d1a">
  <meta name="msapplication-TileImage" content="logo144.png">
  <link rel="icon" type="image/png" sizes="72x72" href="logo72.png">
  <link rel="icon" type="image/png" sizes="96x96" href="logo96.png">
  <link rel="icon" type="image/png" sizes="144x144" href="logo144.png">
  <link rel="icon" type="image/png" sizes="192x192" href="logo192.png">
  <link rel="apple-touch-icon" sizes="72x72" href="logo72.png">
  <link rel="apple-touch-icon" sizes="96x96" href="logo96.png">
  <link rel="apple-touch-icon" sizes="144x144" href="logo144.png">
  <link rel="apple-touch-icon" sizes="192x192" href="logo192.png">
  <link rel="manifest" href="manifest.json">
  <title>上大人字牌游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    html {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      font-size: 16px;
    }
    
    /* 微信浏览器横屏模式 */
    html.wechat-landscape {
      width: 100vh;
      height: 100vw;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }
    
    html.wechat-landscape body {
      width: 100vh;
      height: 100vw;
      transform: rotate(90deg) translateY(-100vw);
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
      overflow: auto;
    }
    
    html.wechat-landscape .rotate-prompt,
    html.wechat-landscape .wechat-guide {
      display: none !important;
    }
    
    html.wechat-landscape #gameContainer {
      width: 100%;
      height: 100%;
    }
    
    html.wechat-landscape .game-area {
      width: 100% !important;
      height: 100% !important;
    }
    
    /* 微信横屏模式 - 开始页面紧凑布局 */
    html.wechat-landscape .start-screen {
      padding: 0.3rem 0.5rem;
      gap: 0.5rem;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    
    html.wechat-landscape .start-logo {
      width: 60px;
      flex-shrink: 0;
    }
    
    html.wechat-landscape .start-content {
      gap: 0.3rem;
    }
    
    html.wechat-landscape .start-options {
      gap: 0.2rem 0.8rem;
      grid-template-columns: 1fr 1fr;
    }
    
    html.wechat-landscape .option-section {
      gap: 0.1rem;
    }
    
    html.wechat-landscape .option-label {
      font-size: 0.65rem;
    }
    
    html.wechat-landscape .option-buttons {
      gap: 0.2rem;
    }
    
    html.wechat-landscape .option-btn {
      padding: 0.2rem 0.4rem;
      font-size: 0.6rem;
      min-height: 26px;
      min-width: 40px;
    }
    
    html.wechat-landscape .start-buttons {
      gap: 0.2rem;
      margin-top: 0.2rem;
    }
    
    html.wechat-landscape .start-game-btn {
      padding: 0.3rem 1rem;
      font-size: 0.75rem;
    }
    
    /* 微信横屏模式 - 牌堆居中适配 */
    html.wechat-landscape .center-area {
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
    }
    
    html.wechat-landscape .center-area.dealing-complete {
      top: 25px !important;
      left: 120px !important;
      transform: none !important;
    }
    
    html.wechat-landscape .center-area.dealing-complete .deck-area {
      transform: scale(0.28) !important;
    }
    
    .rotate-prompt {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d3d1a;
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      text-align: center;
    }
    
    .rotate-prompt.show {
      display: flex;
    }
    
    .rotate-prompt-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      animation: rotate-phone 1.5s ease-in-out infinite;
    }
    
    @keyframes rotate-phone {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    
    .rotate-prompt-text {
      font-size: 18px;
      margin-bottom: 10px;
    }
    
    .rotate-prompt-hint {
      font-size: 14px;
      color: #aaa;
    }
    
    .rotate-prompt-close {
      margin-top: 20px;
      padding: 10px 30px;
      background: #2a7a3a;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    
    .rotate-prompt-close:active {
      background: #1a5a2a;
    }
    
    @media screen and (max-width: 600px) {
      html {
        font-size: 18px;
      }
    }
    
    @media screen and (min-width: 601px) and (max-width: 900px) {
      html {
        font-size: 17px;
      }
    }
    
    @media screen and (min-width: 901px) {
      html {
        font-size: 16px;
      }
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
      background: radial-gradient(ellipse at center, #1a5c2e 0%, #0d3d1a 50%, #062810 100%);
      color: #fff;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    
    ::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }
    
    .game-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    @media screen and (max-height: 500px) and (orientation: landscape) {
      .game-header {
        padding: 0.25rem 0.6rem;
      }
      
      .game-title {
        font-size: 0.9rem;
      }
      
      .round-info {
        font-size: 0.9rem;
      }
      
      .player-left, .player-right {
        top: 2.5rem;
        max-height: calc(100vh - 17.5rem);
      }
      
      .player-left {
        max-width: 15.75rem;
      }
      
      .player-right {
        max-width: 9.2rem;
      }
      
      .player-left .player-discard,
      .player-left .player-melds-side {
        max-width: 15.75rem;
        height: auto;
        overflow: visible;
        align-items: flex-start;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        column-gap: 1px;
        row-gap: 0;
      }
      
      .player-right .player-discard,
      .player-right .player-melds-side {
        max-width: 9.2rem;
        height: auto;
        overflow: visible;
        align-items: flex-start;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        column-gap: 1px;
        row-gap: 0;
      }
      
      .player-avatar {
        width: 2.5rem;
        height: 2.5rem;
        font-size: 1.25rem;
      }
      
      .player-name {
        font-size: 0.75rem;
      }
      
      .player-stats {
        font-size: 0.65rem;
      }
      
      .card {
        width: 2.5rem;
        height: 3.6rem;
        font-size: 1.25rem;
      }
      
      .card-stack {
        width: 2.2rem;
        height: 8.75rem;
        margin-bottom: -6.4rem;
      }
      
      .my-hand {
        min-height: 9.4rem;
        gap: 0.3rem;
      }
      
      .btn {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }
      
      .action-buttons {
        margin-bottom: 1.25rem;
        gap: 0.4rem;
      }
      
      .bottom-area {
        bottom: 0.6rem;
        padding: 0.3rem 0.6rem;
        flex-direction: row;
        align-items: flex-end;
      }
      
      .bottom-left {
        gap: 1px;
        flex-direction: column;
        max-width: 15.75rem;
      }
      
      .my-discard-side {
        max-width: 15.75rem;
        height: auto;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        column-gap: 1px;
        row-gap: 0;
      }
      
      .my-melds-side {
        max-width: 15.75rem;
        height: auto;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        column-gap: 1px;
        row-gap: 0;
      }
      
      .bottom-right {
        flex: 1;
        flex-direction: column;
        align-items: center;
      }
      
      .hand-area {
        flex-direction: row;
        align-items: center;
      }
      
      .ting-badge {
        right: -3.1rem;
        font-size: 0.9rem;
        padding: 0.4rem 0.75rem;
      }
      
      .zimo-badge {
        font-size: 1.25rem;
        padding: 0.6rem 1.1rem;
      }
      
      .piao-setting-popup {
        padding: 0.4rem 0.5rem;
      }
      
      .piao-btn {
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
        min-height: 36px;
      }
      
      .deck-card {
        width: 7.5rem;
        height: 1.75rem;
      }
      
      .deck-count-overlay {
        font-size: 0.9rem;
      }
      
      .deck-count {
        font-size: 0.7rem;
      }
      
      .player-melds-side {
        max-width: 9.4rem;
      }
      
      .meld-text {
        font-size: 0.65rem;
      }
      
      .player-avatar-box {
        padding: 0.4rem 0.5rem;
        gap: 0.4rem;
      }
      
      .player-row {
        gap: 0.3rem;
      }
      
      .player-row-my {
        gap: 0.3rem;
      }
      
      .role-badge {
        font-size: 0.5rem;
        padding: 1px 0.25rem;
      }
      
      .bottom-area {
        bottom: 0.6rem;
      }
    }
    
    @media screen and (max-height: 400px) and (orientation: landscape) {
      .player-avatar {
        width: 2.2rem;
        height: 2.2rem;
        font-size: 1.1rem;
      }
      
      .card {
        width: 2.2rem;
        height: 3.1rem;
        font-size: 1.1rem;
      }
      
      .card-stack {
        width: 1.9rem;
        height: 7.5rem;
        margin-bottom: -5.3rem;
      }
      
      .my-hand {
        min-height: 8.1rem;
        gap: 0.2rem;
      }
      
      .btn {
        padding: 0.4rem 0.75rem;
        font-size: 0.75rem;
      }
      
      .action-buttons {
        margin-bottom: 0.9rem;
        gap: 0.25rem;
      }
      
      .player-left, .player-right {
        top: 2.2rem;
      }
      
      .player-avatar-box {
        padding: 0.25rem 0.4rem;
        gap: 0.25rem;
      }
      
      .player-name {
        font-size: 0.7rem;
      }
      
      .player-stats {
        font-size: 0.55rem;
      }
      
      .bottom-area {
        flex-direction: row;
        align-items: flex-end;
      }
      
      .bottom-left {
        gap: 1px;
      }
      
      .bottom-right {
        flex: 1;
      }
      
      .start-logo {
        width: 5rem;
      }
      
      .hand-area {
        flex-direction: row;
        align-items: center;
      }
      
      .ting-badge {
        right: -2.8rem;
        font-size: 0.9rem;
        padding: 0.4rem 0.6rem;
        background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        box-shadow: 0 2px 6px rgba(255, 107, 107, 0.4);
      }
      
      .zimo-badge {
        font-size: 1.1rem;
        padding: 0.5rem 0.9rem;
      }
      
      .piao-setting-popup {
        padding: 0.3rem 0.4rem;
      }
      
      .piao-btn {
        padding: 0.2rem 0.4rem;
        font-size: 0.7rem;
        min-height: 32px;
      }
    }
    
    .game-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.9rem;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
      z-index: 100;
    }
    
    .game-title {
      font-size: 1rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255,215,0,0.5);
    }
    
    .round-info {
      position: fixed;
      bottom: 0.6rem;
      right: 0.6rem;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 5px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.5);
      padding: 0.3rem 0.9rem;
      border-radius: 0.9rem;
      z-index: 100;
    }
    
    .countdown {
      font-size: 1.1rem;
      color: #ff6b6b;
      font-weight: bold;
      min-width: 2.5rem;
      text-align: center;
    }
    
    .countdown.warning {
      animation: blink 0.5s infinite;
      color: #ff0000;
    }
    
    .player-timer {
      position: absolute;
      top: -0.3rem;
      left: -0.3rem;
      width: 1.5rem;
      height: 1.5rem;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      animation: timer-pulse 1s infinite;
      flex-shrink: 0;
      z-index: 10;
    }
    
    .player-timer::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid #ffd700;
      box-sizing: border-box;
    }
    
    .player-timer.hidden {
      display: none;
      animation: none;
    }
    
    .player-timer.warning {
      animation: timer-pulse-fast 0.3s infinite;
      background: rgba(255, 0, 0, 0.9);
    }
    
    .player-timer.warning::before {
      border-color: #ff0000;
    }
    
    @keyframes timer-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes timer-pulse-fast {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .game-board {
      flex: 1;
      position: relative;
    }
    
    .player-top {
      position: absolute;
      top: 3.1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .player-left {
      position: absolute;
      left: 0.6rem;
      top: 0.3rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      z-index: 1500;
      max-width: 15.75rem;
      max-height: calc(100vh - 15.6rem);
    }
    
    .player-right {
      position: absolute;
      right: 0.6rem;
      top: 0.3rem;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
      z-index: 1500;
      max-width: 15.75rem;
      max-height: calc(100vh - 15.6rem);
    }
    
    .player-left .player-melds-side,
    .player-left .player-discard {
      overflow: visible;
      max-width: 15.75rem;
      height: auto;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 1px;
      align-items: flex-start;
    }
    
    .player-right .player-melds-side,
    .player-right .player-discard {
      overflow: visible;
      max-width: 9.2rem;
      height: auto;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 1px;
      align-items: flex-start;
    }
    
    .player-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
    }
    
    .player-row-my {
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
    }
    
    .player-avatar-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0,0,0,0.5);
      padding: 0.5rem 0.75rem;
      border-radius: 1.5rem;
      border: 2px solid rgba(255,255,255,0.2);
    }
    
    .player-avatar {
      width: 3.1rem;
      height: 3.1rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      position: relative;
      flex-shrink: 0;
    }
    
    .player-avatar.landlord {
      background: linear-gradient(145deg, #ffd700, #daa520);
      border: 3px solid #ffd700;
      box-shadow: 0 0 15px rgba(255,215,0,0.7);
    }
    
    .player-avatar.farmer {
      background: linear-gradient(145deg, #4a7c59, #2d5a3d);
      border: 3px solid #6b9b7a;
    }
    
    .role-badge {
      position: absolute;
      bottom: -0.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      padding: 1px 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
      background: #ff6b6b;
      color: #fff;
      font-weight: bold;
    }
    
    .player-avatar.farmer .role-badge {
      background: #4ecdc4;
    }
    
    .player-info {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    
    .player-name-row {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .player-name {
      font-size: 0.9rem;
      font-weight: bold;
    }
    
    .player-name.current {
      color: #ffd700;
    }
    
    .player-stats {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
    }
    
    .hand-count {
      color: #ffd700;
      background: rgba(0,0,0,0.4);
      padding: 1px 0.4rem;
      border-radius: 0.5rem;
      transition: transform 0.15s ease, opacity 0.15s ease;
      display: inline-block;
    }
    
    .hand-count.pulse {
      transform: scale(1.2);
      opacity: 0.8;
    }
    
    .player-score {
      color: #4ecdc4;
      transition: all 0.3s ease;
    }
    
    .player-score.score-changing {
      transform: scale(1.5);
      font-weight: bold;
      animation: scorePulse 0.5s ease-out;
    }
    
    @keyframes scorePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.8); }
      100% { transform: scale(1.5); }
    }
    
    .player-score.score-up {
      color: #4ecdc4;
      text-shadow: 0 0 10px #4ecdc4, 0 0 20px #4ecdc4;
      animation: scoreGlowUp 1s ease-out;
    }
    
    @keyframes scoreGlowUp {
      0% { text-shadow: 0 0 5px #4ecdc4; }
      50% { text-shadow: 0 0 20px #4ecdc4, 0 0 30px #4ecdc4; }
      100% { text-shadow: 0 0 10px #4ecdc4; }
    }
    
    .player-score.score-down {
      color: #ff6b6b;
      text-shadow: 0 0 10px #ff6b6b, 0 0 20px #ff6b6b;
      animation: scoreGlowDown 1s ease-out;
    }
    
    @keyframes scoreGlowDown {
      0% { text-shadow: 0 0 5px #ff6b6b; }
      50% { text-shadow: 0 0 20px #ff6b6b, 0 0 30px #ff6b6b; }
      100% { text-shadow: 0 0 10px #ff6b6b; }
    }
    
    .score-diff {
      position: absolute;
      top: -15px;
      right: -15px;
      font-size: 16px;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 12px;
      animation: scoreFloat 1.5s ease-out forwards;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .score-diff.positive {
      color: #4ecdc4;
      background: rgba(78, 205, 196, 0.3);
      border: 2px solid #4ecdc4;
    }
    
    .score-diff.negative {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.3);
      border: 2px solid #ff6b6b;
    }
    
    .score-diff.fade-out {
      opacity: 0;
      transform: translateY(-30px) scale(0.8);
      transition: all 0.5s ease;
    }
    
    @keyframes scoreFloat {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      20% {
        opacity: 1;
        transform: translateY(0);
      }
      80% {

        <div class="player-discard" id="player2Discard"></div>
      </div>
      
      <div class="center-area">
        <div class="deck-area">
          <div class="deck-stack" id="deckStack">
            <div class="deck-card" style="top:0;left:0;opacity:0.5;"></div>
            <div class="deck-card" style="top:5px;left:1px;opacity:0.6;"></div>
            <div class="deck-card" style="top:10px;left:2px;opacity:0.7;"></div>
            <div class="deck-card" style="top:15px;left:3px;opacity:0.8;"></div>
            <div class="deck-card" style="top:20px;left:4px;opacity:0.9;"></div>
            <div class="deck-card" style="top:25px;left:5px;opacity:1;"></div>
            <span class="deck-count-overlay hidden" id="deckCount"></span>
          </div>
        </div>
        <div class="played-cards" id="playedCards"></div>
      </div>
      
      <div class="round-info">
        <span id="roundNum">1/8</span>
      </div>
      
      <div class="current-time" id="currentTime">00:00:00</div>
      
      <div class="bottom-area">
        <div class="bottom-left">
          <div class="my-discard-side" id="myDiscard"></div>
          <div class="my-melds-side" id="myMelds"></div>
          <div class="player-row-my">
            <div class="player-avatar-box">
              <div class="player-avatar farmer" id="myAvatar">
                <span class="avatar-icon">👨‍🌾</span>
                <span class="role-badge">闲家</span>
                <div class="player-hu-badge hidden" id="myHuBadge"></div>
              </div>
              <div class="player-info">
                <div class="player-name-row">
                  <span class="player-name" id="myName">我</span>
                  <div class="player-piao-badge hidden" id="myPiao"></div>
                  <div class="player-timer hidden" id="myTimer"></div>
                </div>
                <div class="player-stats">
                  <span class="hand-count"><span id="myHandCount">0</span>张</span>
                  <span class="player-score"><span id="myScore">0</span>分</span>
                </div>
              </div>
              <span class="ting-badge hidden" id="tingBadge">听</span>
            </div>
            <div class="piao-setting-popup hidden" id="myPiaoPopup">
              <div class="piao-popup-content">
                <div class="piao-options">
                  <button class="btn btn-secondary piao-btn" onclick="setPiao(0)">0</button>
                  <button class="btn btn-primary piao-btn" onclick="setPiao(5)">5</button>
                  <button class="btn btn-warning piao-btn" onclick="setPiao(10)">10</button>
                  <button class="btn btn-danger piao-btn" onclick="setPiao(20)">20</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="bottom-right">
          <div class="action-area">
            <div class="action-buttons" id="actionButtons"></div>
            <span class="zimo-badge hidden" id="zimoBadge" onclick="handleZimoClick()">自摸</span>
          </div>
          <div class="hand-area">
            <div class="my-hand" id="myHand"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="dealingOverlay" class="dealing-overlay hidden">
    <div class="dealing-text"></div>
  </div>
  
  <div id="dealingMask" class="dealing-mask hidden"></div>

  <div id="messageArea" class="message-area">
    <button class="close-btn" onclick="closeMessage()">×</button>
    <div class="message-title" id="messageTitle"></div>
    <div class="message-content" id="messageContent"></div>
    <button class="btn btn-primary" onclick="closeMessage()">确定</button>
  </div>
  
  <div id="settlementPage" class="settlement-page">
    <div class="settlement-container">
      <button class="close-btn" onclick="closeSettlement()">×</button>
      <div id="settlementContent" class="settlement-content"></div>
      <button class="btn btn-primary settlement-btn" onclick="closeSettlement()">确认</button>
      <button class="btn btn-secondary settlement-btn" onclick="exportLogsToFile()" style="display: none;">导出日志</button>
    </div>
  </div>
  
  <div id="settingsPopup" class="settings-popup hidden">
    <div class="settings-container">
      <div class="settings-header">
        <span class="settings-title">系统设置</span>
        <button class="settings-close-btn" onclick="closeSettings()">×</button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <label class="setting-label">音效大小</label>
          <div class="setting-control">
            <input type="range" id="volumeSlider" min="0" max="100" value="100" oninput="updateVolume(this.value)">
            <span id="volumeValue">100%</span>
          </div>
        </div>
        <div class="setting-item">
          <label class="setting-label">游戏难度</label>
          <div class="setting-control">
            <label style="margin-right: 15px; cursor: pointer;">
              <input type="radio" name="difficulty" value="easy" onchange="updateDifficulty('easy')" style="margin-right: 5px;">简单
            </label>
            <label style="margin-right: 15px; cursor: pointer;">
              <input type="radio" name="difficulty" value="medium" onchange="updateDifficulty('medium')" style="margin-right: 5px;">中等
            </label>
            <label style="cursor: pointer;">
              <input type="radio" name="difficulty" value="hard" onchange="updateDifficulty('hard')" style="margin-right: 5px;">困难
            </label>
          </div>
        </div>
        <div class="setting-item" style="margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.15);">
          <button class="btn btn-exit-game" onclick="exitGame()">退出游戏</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(registration) {
          console.log('ServiceWorker注册成功:', registration.scope);
        }).catch(function(error) {
          console.log('ServiceWorker注册失败:', error);
        });
      });
    }
  </script>
</body>
</html>
