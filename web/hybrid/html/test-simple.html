<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单测试</title>
</head>
<body>
  <h1>简单测试</h1>
  <button onclick="runTest()">运行测试</button>
  <div id="log"></div>

  <script src="game.js"></script>
  <script>
    function log(msg) {
      document.getElementById('log').innerHTML += msg + '<br>';
      console.log(msg);
    }

    function runTest() {
      log('测试开始');
      try {
        log('gameSettings 类型: ' + typeof gameSettings);
        log('gameState 类型: ' + typeof gameState);
        log('checkHu 类型: ' + typeof checkHu);
        log('checkTing 类型: ' + typeof checkTing);

        if (typeof checkHu === 'function' && typeof checkTing === 'function') {
          const testHand = '上丘乙己化三尔小生八九十土'.split('').map(c => {
            const info = {
              '上': {s:1,p:0,c:'red'},'大':{s:1,p:1,c:'green'},'人':{s:1,p:2,c:'black'},
              '丘':{s:2,p:0,c:'red'},'乙':{s:2,p:1,c:'green'},'己':{s:2,p:2,c:'black'},
              '化':{s:3,p:0,c:'red'},'三':{s:3,p:1,c:'green'},'千':{s:3,p:2,c:'black'},
              '七':{s:4,p:0,c:'red'},'十':{s:4,p:1,c:'green'},'土':{s:4,p:2,c:'black'},
              '尔':{s:5,p:0,c:'red'},'小':{s:5,p:1,c:'green'},'生':{s:5,p:2,c:'black'},
              '八':{s:6,p:0,c:'red'},'九':{s:6,p:1,c:'green'},'子':{s:6,p:2,c:'black'},
              '佳':{s:7,p:0,c:'red'},'作':{s:7,p:1,c:'green'},'亡':{s:7,p:2,c:'black'},
              '福':{s:8,p:0,c:'red'},'禄':{s:8,p:1,c:'green'},'寿':{s:8,p:2,c:'black'}
            };
            const i = info[c];
            return { character: c, sentence: i.s, position: i.p, color: i.c, id: Math.random().toString(36).substr(2, 9) };
          });

          const player = { name: '测试', hand: testHand, melds: [], discards: [], isTing: false };
          log('手牌数量: ' + player.hand.length);

          const huResult = checkHu(player);
          log('胡牌结果: canHu=' + huResult.canHu + ', type=' + (huResult.huType?.name || '无'));

          const tingResult = checkTing(player);
          log('听牌结果: isTing=' + tingResult.isTing + ', tingCards=' + (tingResult.tingCards?.join(',') || '无'));
        } else {
          log('错误: checkHu 或 checkTing 函数不可用');
        }
      } catch (e) {
        log('错误: ' + e.message);
        log('堆栈: ' + e.stack);
      }
      log('测试结束');
    }
  </script>
</body>
</html>
